- name: command vs shell
  hosts: localhost
  tasks:
  - name: command module
    ansible.builtin.command: "echo 'Hi this is command module' > /tmp/command.txt"

  - name: shell module
    ansible.builtin.shell: "echo 'Hi this is shell module' > /tmp/command.txt"

    #Simple command without the need of shell varibles, environment and feature like redirections,pipes and got for command module

    #If we need to run complex commands and scripts then go for shell module
    #whatever works in command module it will be work in shell moduels but vice versa it will not work